name: Android Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      CI: true
      ANDROID_API_LEVEL: "36"
      ANDROID_BUILD_TOOLS: "36.0.0"
      ANDROID_NDK_VERSION: "27.0.12077973"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses >/dev/null

      - name: Install Android SDK packages
        run: |
          sdkmanager "platform-tools" \
            "platforms;android-${ANDROID_API_LEVEL}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "ndk;${ANDROID_NDK_VERSION}"

      - name: Install npm dependencies
        run: npm ci

      - name: Build Android release APK
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.ANDROID_NDK_VERSION }}
          NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.ANDROID_NDK_VERSION }}
        run: npm run build:android:prod

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: syncpeer-android-release-apk
          path: |
            syncpeer-android-release-arm64-v8a.apk
            dist/syncpeer-android-release-arm64-v8a.apk
            packages/tauri-shell/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
