[package]
name = "tauri-shell"
version = "0.1.0"
edition = "2021"

[lib]
name = "tauri_shell_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[dependencies]
tauri = { version = "2.0.0", features = [] }
tauri-plugin-opener = "2.0.0"
tauri-plugin-notification = "2.0.0"
tauri-plugin-syncpeer-android = { path = "plugins/syncpeer-android" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rustls = { version = "0.23", default-features = false, features = ["std", "ring", "tls12"] }
rustls-pemfile = "2"
rcgen = "0.12"
sha2 = "0.10"
data-encoding = "2.6"
url = "2.5"
reqwest = { version = "0.12", default-features = false, features = ["blocking", "rustls-tls-webpki-roots"] }
x509-parser = "0.16"

[build-dependencies]
tauri-build = { version = "2.0.0", features = [] }
