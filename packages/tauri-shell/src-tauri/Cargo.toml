[package]
name = "tauri-shell"
version = "0.1.0"
edition = "2021"

[lib]
name = "tauri_shell_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[dependencies]
tauri = { version = "2.0.0", features = [] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
native-tls = "0.2"

[build-dependencies]
tauri-build = { version = "2.0.0", features = [] }
